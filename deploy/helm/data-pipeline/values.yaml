replicaCount: 2

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/data-pipeline
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

serviceAccount:
  create: true
  name: data-pipeline
  annotations: {}

podAnnotations:
  # Prometheus pod scrape annotations. Assumes the app exposes `/metrics`.
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  runAsUser: 10001
  runAsGroup: 10001
  capabilities:
    drop:
      - ALL

secretRef:
  # Secret must be provisioned out-of-band (for example, AWS Secrets Manager sync
  # via External Secrets). Keep empty by default to avoid hardcoded secret names.
  name: ""

namespace:
  # Create namespace with Pod Security "restricted" labels via this chart.
  create: true

networkPolicy:
  enabled: true
  prometheusNamespace: observability

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

readinessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
